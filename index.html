<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unity Package Extractor (Browser)</title>
    <script src="https://cdn.jsdelivr.net/npm/fflate@0.8.2/umd/index.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP&family=Noto+Sans+KR&family=Noto+Sans&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <h1 data-lang="title">Package Extractor</h1>
    <p><span data-lang="description">You can individually retrieve textures, model data, and other files within the
            .unitypackage extension from your browser. </span></p>

    <p><span data-lang="repository">Repository: </span><a href="https://github.com/peraperavrc/package-extractor"
            target="_blank">peraperavrc/package-extractor</a></p>
    <p><span data-lang="creator">Created by </span><a href="https://x.com/peraperavrc" target="_blank">@peraperavrc</a>
    </p>

    <div id="dropZone" data-lang="dropZone">Drag and drop Unity package here</div>
    <input type="file" id="fileInput" style="display: none;" accept=".unitypackage">

    <div class="options-container">
        <div class="checkbox-container">
            <input type="checkbox" id="excludeMeta" checked>
            <label for="excludeMeta" data-lang="excludeMeta">Exclude .meta files</label>
        </div>
        <div class="checkbox-container">
            <input type="checkbox" id="categorizeByExtension" checked>
            <label for="categorizeByExtension" data-lang="categorizeByExtension">Categorize by file extension</label>
        </div>
        <div class="checkbox-container">
            <input type="checkbox" id="maintainStructure">
            <label for="maintainStructure" data-lang="maintainStructure">Maintain file structure</label>
        </div>

        <div class="checkbox-container">
            <input type="checkbox" id="showFileSize" checked>
            <label for="showFileSize" data-lang="showFileSize">Show file size</label>
        </div>
        <div class="checkbox-container">
            <input type="checkbox" id="checkerboardBg" checked>
            <label for="checkerboardBg" data-lang="checkerboardBg">Checkerboard PNG background</label>
        </div>
        <div class="checkbox-container">
            <input type="checkbox" id="showPngGrid" checked>
            <label for="showPngGrid" data-lang="showPngGrid">Show PNG grid view</label>
        </div>
    </div>

    <div id="pngGridControls" style="display:none;">
        <!-- gridSelectAllBtn injected here by JS -->
        <div class="slider-wrapper" style="display: flex; align-items: center; gap: 8px;">
            <!-- Small Grid Icon -->
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round" style="color: var(--text-muted);">
                <rect x="3" y="3" width="7" height="7"></rect>
                <rect x="14" y="3" width="7" height="7"></rect>
                <rect x="3" y="14" width="7" height="7"></rect>
                <rect x="14" y="14" width="7" height="7"></rect>
            </svg>

            <input type="range" id="pngGridScale" min="0" max="100" step="5" value="30" style="width: 120px;">

            <!-- Large Grid Icon -->
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round" style="color: var(--text-muted);">
                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
            </svg>
        </div>

        <select id="sortOrder"
            style="margin-left: auto; padding: 4px 8px; border-radius: 6px; border: 1px solid var(--border-color); color: var(--text-color); background: var(--card-bg);">
            <option value="name_asc" data-lang="sortNameAsc">Name (A-Z)</option>
            <option value="name_desc" data-lang="sortNameDesc">Name (Z-A)</option>
            <option value="size_asc" data-lang="sortSizeAsc">Size (Smallest)</option>
            <option value="size_desc" data-lang="sortSizeDesc">Size (Largest)</option>
        </select>
    </div>

    <div id="pngGrid" style="display:none;"></div>
    <div id="fileList"></div>

    <div class="download-all">
        <button id="downloadAllBtn" style="display: none;" data-lang="downloadAll">Download All as ZIP</button>
    </div>

    <!-- Sticky Selection Bar -->
    <div id="selectionBar">
        <span id="selectionCount">0 selected</span>
        <button id="downloadSelectedBtn" data-lang="downloadSelected">Download Selected</button>
        <button id="clearSelectionBtn" data-lang="clearSelection">Clear</button>
    </div>

    <script src="script.js"></script>
</body>

</html>
